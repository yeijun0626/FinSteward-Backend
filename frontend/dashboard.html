<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FinSteward AI | Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --primary: #2563eb; --bg: #f8fafc; --text: #1e293b; }
        body { margin:0; font-family:'Pretendard', sans-serif; background: var(--bg); color: var(--text); }
        .nav { background: #fff; padding: 15px 40px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #e2e8f0; position: sticky; top:0; z-index:100; }
        .main-container { max-width: 1100px; margin: 40px auto; display: grid; grid-template-columns: 1fr 350px; gap: 30px; padding: 0 20px; }
        
        .card { background: #fff; border-radius: 24px; padding: 30px; box-shadow: 0 4px 20px rgba(0,0,0,0.05); border: 1px solid #f1f5f9; }
        .summary-card { background: var(--primary); color: #fff; display: flex; flex-direction: column; justify-content: space-between; }
        
        .btn-group { display: flex; gap: 10px; margin-bottom: 20px; }
        .btn { flex:1; padding:15px; border-radius:15px; border:none; font-weight:bold; cursor:pointer; transition:0.2s; }
        .btn-ai { background: var(--primary); color:#fff; }
        .btn-manual { background: #f1f5f9; color: var(--text); }
        
        .expense-item { display: flex; justify-content: space-between; padding: 18px; background: #fff; border-radius: 16px; margin-bottom: 12px; transition: 0.2s; border: 1px solid transparent; }
        .expense-item:hover { border-color: var(--primary); transform: translateX(5px); }
        
        #manualModal { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(8px); }
        
        /* 모바일 대응 */
        @media (max-width: 900px) {
            .main-container { grid-template-columns: 1fr; }
            .nav { padding: 15px 20px; }
        }
    </style>
</head>
<body>
    <nav class="nav">
        <h2 style="margin:0; color:var(--primary);">FinSteward.</h2>
        <div style="display:flex; align-items:center; gap:20px;">
            <span id="userNameDisplay" style="font-weight:bold;"></span>
            <button id="logoutBtn" style="background:none; border:1px solid #ddd; padding:8px 15px; border-radius:10px; cursor:pointer;">로그아웃</button>
        </div>
    </nav>

    <div class="main-container">
        <div class="left-content">
            <div class="card summary-card" style="margin-bottom:30px; height: 160px;">
                <div style="display:flex; justify-content:space-between; margin-bottom: 20px;">
                    <div style="display:flex; gap:15px; font-size: 15px;">
                        <span id="tabNet" style="cursor:pointer; font-weight:bold; border-bottom: 2px solid #fff; padding-bottom:3px;">순수익</span>
                        <span id="tabInc" style="cursor:pointer; opacity:0.7; padding-bottom:3px;">수입</span>
                        <span id="tabExp" style="cursor:pointer; opacity:0.7; padding-bottom:3px;">지출</span>
                    </div>
                    <div style="display:flex; gap:10px;">
                        <button id="prevMonth" style="background:rgba(255,255,255,0.2); border:none; color:#fff; border-radius:5px; cursor:pointer;">◀</button>
                        <span id="currentMonthDisplay">2026.04</span>
                        <button id="nextMonth" style="background:rgba(255,255,255,0.2); border:none; color:#fff; border-radius:5px; cursor:pointer;">▶</button>
                    </div>
                </div>
                <h1 id="totalDisplay" style="margin:0; font-size:42px;">0원</h1>
            </div>

            <div class="btn-group" style="display:flex; flex-direction:column; gap:10px;">
                <div style="display:flex; gap:10px;">
                    <button onclick="document.getElementById('receiptFile').click()" class="btn btn-ai" style="flex:1; padding: 15px; border-radius: 12px; background: #2563eb; color: #fff; border: none; font-weight: bold; cursor: pointer;">📸 영수증/계좌 자동 입력</button>
                    <button id="openModalBtn" class="btn btn-manual" style="flex:1; padding: 15px; border-radius: 12px; background: #f8fafc; color: #1e293b; border: 1px solid #e2e8f0; font-weight: bold; cursor: pointer;">✍️ 내역 직접 입력</button>
                </div>
                <div id="aiReport" style="text-align:center; font-size:14px; color:#2563eb; font-weight:bold; height:20px;"></div>
                
                <input type="file" id="receiptFile" style="display:none;" accept="image/*">
            </div>

            <div class="card">
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
                    <h3 style="margin:0;">최근 거래 내역</h3>
                    <input type="text" id="searchInput" placeholder="상호명 검색..." style="padding:8px; border-radius:8px; border:1px solid #ddd;">
                </div>
                <div id="expenseList"></div>
            </div>
        </div>

        <div class="right-content">
            <div class="card" style="margin-bottom:30px;">
                <h3 style="margin-top:0;">카테고리별 통계</h3>
                <canvas id="expenseChart"></canvas>
            </div>
            
            <div class="card" style="background: #eff6ff; border: 1px solid #bfdbfe;">
                <h3 style="margin-top:0; color:var(--primary);">🤖 AI 분석 리포트</h3>
                <p id="aiReport" style="font-size:14px; line-height:1.6; color:#1e40af;">
                    데이터를 분석 중입니다... 내역을 입력하면 당신의 소비 습관을 파악해 드릴게요.
                </p>
            </div>
        </div>
    </div>
   <div id="manualModal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(8px); z-index: 1000; justify-content: center; align-items: center;">
        <div style="background: #fff; width: 400px; max-width: 90%; padding: 30px; border-radius: 24px;">
            <h3 id="modalTitle" style="margin-top: 0; color: #1e293b;">내역 입력</h3>
            <div style="display: flex; gap: 10px; margin-bottom: 20px;">
                <button id="typeExp" style="flex:1; padding: 12px; border:none; border-radius: 12px; background: #ef4444; color: #fff; font-weight: bold; cursor: pointer;">지출</button>
                <button id="typeInc" style="flex:1; padding: 12px; border:none; border-radius: 12px; background: #f1f5f9; color: #1e293b; font-weight: bold; cursor: pointer;">수입</button>
            </div>
            <input type="hidden" id="editId">
            <input type="text" id="manualMerchant" placeholder="거래자 (상호 명)" style="width: 100%; padding: 15px; margin-bottom: 10px; border: 1px solid #e2e8f0; border-radius: 12px; box-sizing: border-box;">
            <input type="text" id="manualDesc" placeholder="내용" style="width: 100%; padding: 15px; margin-bottom: 10px; border: 1px solid #e2e8f0; border-radius: 12px; box-sizing: border-box;">
            <input type="number" id="manualAmount" placeholder="금액" style="width: 100%; padding: 15px; margin-bottom: 10px; border: 1px solid #e2e8f0; border-radius: 12px; box-sizing: border-box;">
            <select id="manualCategory" style="width: 100%; padding: 15px; margin-bottom: 10px; border: 1px solid #e2e8f0; border-radius: 12px; box-sizing: border-box;">
                <option value="1">식비</option><option value="2">교통</option><option value="3">쇼핑</option><option value="4">의료</option><option value="5">기타/수입</option>
            </select>
            <input type="date" id="manualDate" style="width: 100%; padding: 15px; margin-bottom: 25px; border: 1px solid #e2e8f0; border-radius: 12px; box-sizing: border-box;">
            <div style="display: flex; gap: 10px;">
                <button id="closeModalBtn" style="flex:1; padding: 15px; border:none; border-radius: 12px; background: #f1f5f9; color: #64748b; font-weight: bold; cursor: pointer;">취소</button>
                <button id="saveManualBtn" style="flex:1; padding: 15px; border:none; border-radius: 12px; background: #2563eb; color: #fff; font-weight: bold; cursor: pointer;">저장</button>
            </div>
        </div>
    </div>

    <div class="btn-group">
        <button onclick="document.getElementById('receiptFile').click()" class="btn btn-ai">📸 영수증/계좌 자동 입력</button>
        <button id="openModalBtn" class="btn btn-manual">✍️ 내역 직접 입력</button>
        <div id="aiReport" style="margin-top:10px; color:#2563eb; font-weight:bold; text-align:center;"></div>
        <input type="file" id="receiptFile" style="display:none;" accept="image/*">
    </div>

    <script src="dashboard.js"></script>
</body>
</html>
